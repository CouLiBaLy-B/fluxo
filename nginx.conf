server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Compression Gzip ────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── En-têtes de sécurité ─────────────────────────────────────────────────────
    # X-Frame-Options : protège contre le clickjacking
    add_header X-Frame-Options         "SAMEORIGIN"                  always;
    # X-Content-Type-Options : empêche le MIME sniffing
    add_header X-Content-Type-Options  "nosniff"                     always;
    # Referrer-Policy : contrôle les informations de référent
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    # Permissions-Policy : désactive les API navigateur inutiles
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
    # Content-Security-Policy : défense contre XSS
    # Remplace le header X-XSS-Protection déprécié
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"
        always;

    # ── Proxy /api/* → backend Node.js ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_api/api/;
        proxy_http_version 1.1;

        # Keep-alive entre Nginx et le backend
        proxy_set_header   Connection        "";

        # En-têtes transmis au backend
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;

        # Taille maximale des requêtes (ex: upload JSON)
        client_max_body_size 10m;
    }

    # ── Health check Nginx ───────────────────────────────────────────────────────
    location = /health {
        access_log  off;
        return 200  "ok\n";
        add_header  Content-Type text/plain;
    }

    # ── Assets statiques — cache long terme ─────────────────────────────────────
    # Les fichiers Vite ont des hashes dans leurs noms → immuables
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── SPA fallback — toutes les autres routes → index.html ────────────────────
    # Nécessaire pour React Router (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;

        # index.html : pas de cache (toujours la version fraîche)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}
